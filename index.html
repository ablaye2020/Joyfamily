<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛡️ WhatsApp Security - Signalement de Compte Dangereux</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b141a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 🎥 VIDEO GEAR 5 EN FOND (subtile) */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            opacity: 0.12;
            pointer-events: none;
        }
        .video-background iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            transform: scale(1.3);
        }
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b141aee 30%, #0b141a 100%);
            z-index: 1;
        }

        /* 💫 ANIMATIONS */
        @keyframes whatsappPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px #25d36666); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 35px #25d366cc) drop-shadow(0 0 70px #25d36644); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px #25d36666); }
        }
        @keyframes ringPulse {
            0% { box-shadow: 0 0 0 0 #25d36633, 0 0 0 0 #25d36611; }
            100% { box-shadow: 0 0 0 25px transparent, 0 0 0 50px transparent; }
        }
        @keyframes floatBubble {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px #ff6b6b44; }
            50% { box-shadow: 0 0 50px #ff6b6b88, 0 0 100px #ff6b6b33; }
        }

        /* 🟢 CARTE PRINCIPALE */
        .whatsapp-card {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            width: 100%;
            background: #0e1a22f5;
            backdrop-filter: blur(15px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 
                0 30px 70px rgba(0,0,0,0.95),
                0 0 0 3px #ff6b6b55 inset,
                0 0 60px #ff6b6b22;
            padding: 30px 30px 40px;
            border: 1px solid #ff6b6b44;
            animation: slideIn 0.7s ease;
        }

        /* 🏆 HEADER WHATSAPP SECURITY */
        .whatsapp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 3px solid #ff6b6b44;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        /* 💚 LOGO WHATSAPP ANIMÉ */
        .whatsapp-logo {
            position: relative;
            font-size: 3rem;
            color: #25d366;
            animation: whatsappPulse 2.8s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .whatsapp-logo .logo-ring {
            position: absolute;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #25d36655;
            animation: ringPulse 2.5s infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .whatsapp-logo i {
            background: #0e1a22;
            padding: 14px;
            border-radius: 50%;
            border: 3px solid #25d366;
            box-shadow: 0 0 40px #25d36655;
            position: relative;
            z-index: 2;
            font-size: 2.6rem;
        }
        .whatsapp-logo .badge-security {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: #ff6b6b;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 40px;
            border: 2px solid #0e1a22;
            z-index: 3;
            letter-spacing: 0.5px;
            animation: floatBubble 2.5s infinite ease-in-out;
        }

        .whatsapp-title {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .whatsapp-title span {
            color: #ff6b6b;
            font-weight: 900;
            text-shadow: 0 0 30px #ff6b6b55;
        }
        .whatsapp-title .sub {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            color: #aebac1;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header-right {
            color: #aebac1;
            font-size: 0.8rem;
            background: #1a2a32cc;
            padding: 8px 20px;
            border-radius: 60px;
            border: 2px solid #ff6b6b44;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        .header-right i {
            color: #ff6b6b;
            font-size: 1.1rem;
        }
        .header-right .alert-dot {
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            display: inline-block;
            animation: ringPulse 1.5s infinite;
        }

        /* 📋 TABS */
        .tabs-container {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            min-width: 150px;
            padding: 16px 14px;
            border: 2.5px solid #2a3b44;
            border-radius: 60px;
            background: transparent;
            color: #aebac1;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .tab-btn i { font-size: 1.3rem; transition: 0.3s; }
        .tab-btn.active {
            background: #ff6b6b22;
            border-color: #ff6b6b;
            color: #fff;
            box-shadow: 0 0 40px #ff6b6b33;
            transform: scale(1.02);
        }
        .tab-btn.active i { color: #ff6b6b; text-shadow: 0 0 30px #ff6b6b88; }
        .tab-btn:hover {
            background: #1f2c34;
            border-color: #ff6b6b77;
            transform: translateY(-2px);
        }

        /* 📦 PANELS */
        .panel {
            display: none;
            animation: slideIn 0.5s ease;
        }
        .panel.active { display: block; }

        /* 🎯 ZONE DE GÉNÉRATION */
        .gen-box {
            background: #0b141aee;
            border-radius: 28px;
            padding: 24px 24px 28px;
            border: 2px solid #2a3b44;
            box-shadow: inset 0 0 40px #00000055;
            margin-bottom: 18px;
        }
        .gen-box label {
            color: #d1d9df;
            font-weight: 700;
            font-size: 1rem;
            display: block;
            margin-bottom: 10px;
        }
        .gen-box label i {
            margin-right: 10px;
            color: #ff6b6b;
        }
        .gen-box textarea {
            width: 100%;
            background: #14222b;
            border: 2.5px solid #2a3b44;
            border-radius: 20px;
            padding: 16px 20px;
            color: #e9edef;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            transition: 0.4s;
            outline: none;
            line-height: 1.6;
        }
        .gen-box textarea:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 30px #ff6b6b33;
        }
        .gen-box textarea::placeholder {
            color: #4a5b65;
            font-style: italic;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 20px;
            align-items: center;
        }
        .btn-generate {
            background: linear-gradient(145deg, #ff6b6b, #e04848);
            border: none;
            padding: 16px 38px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.15rem;
            color: #fff;
            cursor: pointer;
            transition: 0.4s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 40px #ff6b6b44, 0 8px 20px #00000066;
            flex: 1;
            justify-content: center;
            min-width: 180px;
        }
        .btn-generate:hover {
            transform: scale(1.04) translateY(-2px);
            background: linear-gradient(145deg, #ff7a7a, #ff5555);
            box-shadow: 0 0 60px #ff6b6b88, 0 12px 30px #00000088;
        }
        .btn-generate i { font-size: 1.3rem; }

        .btn-copy {
            background: #1a2a32;
            border: 2.5px solid #ff6b6b55;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            color: #d1d9df;
            cursor: pointer;
            transition: 0.4s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex: 0.5;
            min-width: 130px;
            justify-content: center;
        }
        .btn-copy:hover {
            background: #2a3b44;
            border-color: #ff6b6b;
            color: #fff;
            box-shadow: 0 0 30px #ff6b6b33;
            transform: translateY(-2px);
        }
        .btn-copy i { color: #ff6b6b; font-size: 1.1rem; }

        /* 🔐 CODE SECTION (fils de JOY) */
        .code-section {
            background: #0f1a22;
            border-radius: 24px;
            padding: 18px 24px;
            border-left: 6px solid #f5c542;
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
        }
        .code-section label {
            color: #f5c542;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .code-section label i { font-size: 1.4rem; }
        .code-section input {
            flex: 1;
            min-width: 140px;
            background: #14222b;
            border: 2.5px solid #3a4b54;
            border-radius: 60px;
            padding: 12px 22px;
            color: #e9edef;
            font-size: 1rem;
            outline: none;
            transition: 0.4s;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .code-section input:focus {
            border-color: #f5c542;
            box-shadow: 0 0 30px #f5c54244;
        }
        .code-section .code-status {
            color: #aebac1;
            font-size: 0.85rem;
            background: #14222b;
            padding: 6px 18px;
            border-radius: 60px;
            border: 2px solid #3a4b54;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .code-section .code-status.valid {
            border-color: #25d366;
            color: #25d366;
            background: #25d36622;
        }
        .code-section .code-status.invalid {
            border-color: #ff6b6b;
            color: #ff6b6b;
            background: #ff6b6b22;
        }

        /* 📤 MESSAGE GÉNÉRÉ */
        .generated-message {
            background: #0b141a;
            border-radius: 24px;
            padding: 22px 26px;
            border: 2px solid #2a3b44;
            min-height: 80px;
            color: #e9edef;
            font-size: 1rem;
            line-height: 1.7;
            margin-top: 10px;
            transition: 0.4s;
            box-shadow: inset 0 0 30px #00000044;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .generated-message:empty::before {
            content: '📨 Votre message de signalement apparaîtra ici...';
            color: #4a5b65;
            font-style: italic;
        }

        /* 🦊 FOOTER */
        .whatsapp-footer {
            margin-top: 28px;
            text-align: center;
            color: #4a5b65;
            font-size: 0.75rem;
            border-top: 2px solid #1a2a32;
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .whatsapp-footer span i { margin: 0 4px; }
        .whatsapp-footer .power { color: #ff6b6b88; font-weight: 600; }

        /* 📱 RESPONSIVE */
        @media (max-width: 700px) {
            .whatsapp-card { padding: 18px; }
            .whatsapp-title { font-size: 1.3rem; }
            .whatsapp-logo i { font-size: 2rem; padding: 10px; }
            .whatsapp-logo .logo-ring { width: 70px; height: 70px; }
            .header-right { font-size: 0.7rem; padding: 6px 14px; }
            .tab-btn { font-size: 0.85rem; min-width: 110px; padding: 12px 8px; }
            .btn-generate { font-size: 1rem; padding: 14px 20px; }
            .code-section { padding: 14px; }
        }
        @media (max-width: 480px) {
            .whatsapp-card { border-radius: 32px; padding: 14px; }
            .whatsapp-title { font-size: 1.1rem; }
            .header-left { gap: 10px; }
            .tab-btn { font-size: 0.7rem; min-width: 80px; padding: 10px 6px; gap: 6px; }
            .tab-btn i { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- 🎥 VIDEO GEAR 5 EN ARRIÈRE-PLAN -->
    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/TxjVbR4iF54?autoplay=1&mute=1&loop=1&playlist=TxjVbR4iF54&controls=0&showinfo=0&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="video-overlay"></div>

    <!-- 💬 CARTE PRINCIPALE -->
    <div class="whatsapp-card">

        <!-- 🟢 HEADER WHATSAPP SECURITY -->
        <div class="whatsapp-header">
            <div class="header-left">
                <div class="whatsapp-logo">
                    <div class="logo-ring"></div>
                    <i class="fab fa-whatsapp"></i>
                    <span class="badge-security"><i class="fas fa-shield-alt"></i> SECURITY</span>
                </div>
                <div class="whatsapp-title">
                    WhatsApp <span>Signalement</span>
                    <span class="sub"><i class="fas fa-exclamation-triangle" style="color:#ff6b6b;"></i> Générateur de messages pour compte dangereux</span>
                </div>
            </div>
            <div class="header-right">
                <span class="alert-dot"></span>
                <i class="fas fa-shield-alt"></i>
                <span>Signalement <i class="fas fa-lock" style="font-size:0.8rem;"></i></span>
                <span style="border-left:1px solid #2a3b44;padding-left:10px;"><i class="fas fa-flag"></i> Urgent</span>
            </div>
        </div>

        <!-- 📋 TABS -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="panel-fans">
                <i class="fas fa-users"></i> Fans de JOY
            </button>
            <button class="tab-btn" data-tab="panel-fils">
                <i class="fas fa-crown"></i> Fils de JOY
            </button>
        </div>

        <!-- 📦 PANEL 1 : FANS -->
        <div id="panel-fans" class="panel active">
            <div class="gen-box">
                <label><i class="fas fa-pen-fancy"></i> Détails du compte à signaler (optionnel)</label>
                <textarea id="input-fans" placeholder="Ex: Numéro de téléphone, comportement suspect, preuves... Laissez vide pour un message générique."></textarea>
            </div>
            <div class="action-row">
                <button class="btn-generate" id="gen-fans"><i class="fas fa-shield-halved"></i> Générer le signalement</button>
                <button class="btn-copy" id="copy-fans"><i class="fas fa-copy"></i> Copier</button>
            </div>
            <div class="generated-message" id="output-fans"></div>
        </div>

        <!-- 📦 PANEL 2 : FILS DE JOY -->
        <div id="panel-fils" class="panel">
            <div class="code-section">
                <label><i class="fas fa-key"></i> Code d'accès</label>
                <input type="text" id="access-code" placeholder="Entrez le code secret..." />
                <span class="code-status" id="code-status"><i class="fas fa-circle"></i> En attente</span>
            </div>
            <div class="gen-box">
                <label><i class="fas fa-crown" style="color:#f5c542;"></i> Détails du signalement (optionnel)</label>
                <textarea id="input-fils" placeholder="Infos supplémentaires sur le compte dangereux..."></textarea>
            </div>
            <div class="action-row">
                <button class="btn-generate" id="gen-fils"><i class="fas fa-shield-halved"></i> Générer le signalement</button>
                <button class="btn-copy" id="copy-fils"><i class="fas fa-copy"></i> Copier</button>
            </div>
            <div class="generated-message" id="output-fils"></div>
        </div>

        <!-- 🦊 FOOTER -->
        <div class="whatsapp-footer">
            <span><i class="fas fa-check-circle" style="color:#25d366;"></i> Signalement chiffré</span>
            <span><i class="fas fa-bolt" style="color:#f5c542;"></i> Propulsé par JOY</span>
            <span class="power"><i class="fas fa-skull"></i> Gear 5 Luffy <i class="fas fa-skull"></i></span>
            <span><i class="fab fa-whatsapp" style="color:#25d366;"></i> WhatsApp Inc.</span>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. GESTION DES TABS
        // ============================================================
        const tabs = document.querySelectorAll('.tab-btn');
        const panels = {
            fans: document.getElementById('panel-fans'),
            fils: document.getElementById('panel-fils')
        };

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', `panel-${key}` === target);
                });
            });
        });

        // ============================================================
        // 2. CODE D'ACCÈS POUR LES FILS DE JOY
        // ============================================================
        const codeInput = document.getElementById('access-code');
        const codeStatus = document.getElementById('code-status');
        const SECRET_CODE = 'JOY2026';

        function checkCode() {
            const val = codeInput.value.trim();
            if (val === SECRET_CODE) {
                codeStatus.className = 'code-status valid';
                codeStatus.innerHTML = '<i class="fas fa-check-circle"></i> Code valide ✅';
                return true;
            } else if (val === '') {
                codeStatus.className = 'code-status';
                codeStatus.innerHTML = '<i class="fas fa-circle"></i> En attente';
                return false;
            } else {
                codeStatus.className = 'code-status invalid';
                codeStatus.innerHTML = '<i class="fas fa-times-circle"></i> Code incorrect ❌';
                return false;
            }
        }
        codeInput.addEventListener('input', checkCode);

        // ============================================================
        // 3. GÉNÉRATION DE MESSAGES DE SIGNALEMENT
        // ============================================================
        function generateReport(type, userDetails) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

            const details = userDetails && userDetails.trim().length > 3 
                ? userDetails.trim() 
                : 'Compte suspect avec comportement inapproprié et violations répétées des conditions d\'utilisation de WhatsApp.';

            if (type === 'fans') {
                return `📍 SIGNALEMENT DE COMPTE DANGEREUX - WhatsApp

📅 Date : ${dateStr} à ${timeStr}
👤 Signalé par : Un membre de la communauté JOY

🚨 OBJET : Demande de blocage immédiat d'un compte ne respectant pas les règles de WhatsApp

🔴 DESCRIPTION DU COMPTE INCriminé :
${details}

⚖️ VIOLATIONS CONSTATÉES :
- Non-respect des conditions d'utilisation de WhatsApp
- Comportement abusif et dangereux envers d'autres utilisateurs
- Tentatives de harcèlement et d'intimidation
- Diffusion de contenus inappropriés et non conformes

📋 PREUVES :
Des captures d'écran et des enregistrements ont été conservés et peuvent être fournis sur demande.

🙏 DEMANDE :
Je sollicite auprès de l'équipe de modération de WhatsApp le blocage définitif de ce compte afin de protéger la communauté et de garantir un espace sécurisé pour tous les utilisateurs.

🔗 Référence : #JOY-${Date.now().toString().slice(-6)}

Merci de prendre en compte cette demande urgente.

Cordialement,
Un utilisateur engagé pour la sécurité de WhatsApp

--- Ce message a été généré via le système de signalement JOY ---`;
            }

            if (type === 'fils') {
                return `👑 SIGNALEMENT PRIORITAIRE - Compte Dangereux

📅 Date : ${dateStr} à ${timeStr}
👤 Signalé par : Un Fils de JOY (niveau d'accès privilégié)

🚨 OBJET : BLOCAGE URGENT - Compte violant gravement les règles de WhatsApp

🔴 IDENTIFICATION DU COMPTE :
${details}

⚠️ GRAVITÉ : NIVEAU MAXIMUM
- Menaces directes envers la sécurité des utilisateurs
- Usurpation d'identité et escroqueries avérées
- Harcèlement systématique et comportement prédateur
- Multiples signalements antérieurs sans action

📸 PREUVES IRRÉFUTABLES :
- Captures d'écran authentifiées
- Historique des conversations compromettantes
- Témoignages de victimes
- Analyse comportementale confirmant les intentions malveillantes

⚡ ACTION REQUISE :
Blocage immédiat du compte + interdiction de créer un nouveau compte
Analyse approfondie des données associées
Notification aux autorités compétentes si nécessaire

🔐 Code de sécurité : ${SECRET_CODE} - Niveau Fils de JOY
Référence : #JOY-ELITE-${Date.now().toString().slice(-8)}

🙏 Nous comptons sur votre réactivité pour protéger la communauté WhatsApp.

Avec toute notre détermination,
Les Fils de JOY 🦁🔥

--- Signalement prioritaire via le réseau JOY ---`;
            }

            return 'Message de signalement généré.';
        }

        // ============================================================
        // 4. AFFICHAGE
        // ============================================================
        const outputFans = document.getElementById('output-fans');
        const outputFils = document.getElementById('output-fils');
        const inputFans = document.getElementById('input-fans');
        const inputFils = document.getElementById('input-fils');

        function displayReport(type) {
            let input, output;
            if (type === 'fans') {
                input = inputFans;
                output = outputFans;
            } else {
                input = inputFils;
                output = outputFils;
            }

            if (type === 'fils' && !checkCode()) {
                output.textContent = '⛔ Accès refusé. Veuillez entrer le code correct pour les Fils de JOY.';
                output.style.borderColor = '#ff6b6b';
                return;
            } else {
                output.style.borderColor = '#2a3b44';
            }

            const message = generateReport(type, input.value);
            output.textContent = message;
        }

        // ============================================================
        // 5. BOUTONS
        // ============================================================
        document.getElementById('gen-fans').addEventListener('click', () => displayReport('fans'));
        document.getElementById('gen-fils').addEventListener('click', () => displayReport('fils'));

        function copyReport(type) {
            const output = type === 'fans' ? outputFans : outputFils;
            const text = output.textContent;
            if (!text || text.includes('⛔') || text.includes('📨 Votre message')) {
                alert('❌ Rien à copier. Générez d\'abord un signalement !');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = type === 'fans' ? document.getElementById('copy-fans') : document.getElementById('copy-fils');
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copié !';
                setTimeout(() => btn.innerHTML = original, 2000);
            }).catch(() => {
                alert('❌ Impossible de copier. Sélectionne et copie manuellement.');
            });
        }

        document.getElementById('copy-fans').addEventListener('click', () => copyReport('fans'));
        document.getElementById('copy-fils').addEventListener('click', () => copyReport('fils'));

        // ============================================================
        // 6. AUTO-GÉNÉRATION AU CHARGEMENT
        // ============================================================
        window.addEventListener('load', () => displayReport('fans'));

        // ============================================================
        // 7. RACCOURCI ENTER
        // ============================================================
        inputFans.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.shiftKey === false) {
                e.preventDefault();
                displayReport('fans');
            }
        });
        inputFils.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.shiftKey === false) {
                e.preventDefault();
                displayReport('fils');
            }
        });

        console.log('🛡️ WhatsApp Security Generator prêt !');
        console.log('🔐 Code secret Fils de JOY : JOY2026');
        console.log('⚡ Gear 5 Luffy - Protection activée !');
    </script>
