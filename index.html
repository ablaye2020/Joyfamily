<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JOYBOY WhatsApp - Générateur de Signalement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b141a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* === VIDÉO JOYBOY (Luffy Gear 5) EN FOND === */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .video-bg iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            transform: scale(1.2);
        }
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 20, 26, 0.88);
            z-index: 1;
        }

        /* === ANIMATIONS === */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(37, 211, 102, 0.2); }
            50% { box-shadow: 0 0 50px rgba(37, 211, 102, 0.4), 0 0 100px rgba(37, 211, 102, 0.1); }
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* === CARTE PRINCIPALE === */
        .whatsapp-card {
            position: relative;
            z-index: 10;
            max-width: 920px;
            width: 100%;
            background: rgba(14, 26, 34, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(37, 211, 102, 0.15);
            padding: 28px 30px 34px;
            border: 1px solid rgba(37, 211, 102, 0.1);
            animation: fadeSlide 0.6s ease;
        }

        /* === HEADER === */
        .whatsapp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(37, 211, 102, 0.12);
            margin-bottom: 26px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-wa {
            position: relative;
            font-size: 2.6rem;
            color: #25d366;
            animation: floatLogo 3s ease-in-out infinite;
        }
        .logo-wa i {
            background: rgba(14, 26, 34, 0.9);
            padding: 10px;
            border-radius: 50%;
            border: 2px solid #25d366;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.2);
            font-size: 2.2rem;
        }
        .logo-wa .badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #25d366;
            color: #0b141a;
            font-size: 0.55rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 30px;
            border: 2px solid #0e1a22;
            letter-spacing: 0.3px;
        }
        .title {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .title span {
            color: #25d366;
        }
        .title .sub {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            color: #8696a0;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .header-right {
            color: #8696a0;
            font-size: 0.8rem;
            background: rgba(26, 42, 50, 0.6);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(37, 211, 102, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-right .dot {
            width: 8px;
            height: 8px;
            background: #25d366;
            border-radius: 50%;
            display: inline-block;
            animation: pulseGlow 2s infinite;
        }

        /* === TABS === */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 26px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 16px;
            border: 2px solid #2a3b44;
            border-radius: 50px;
            background: transparent;
            color: #8696a0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .tab-btn i { font-size: 1.2rem; }
        .tab-btn.active {
            background: rgba(37, 211, 102, 0.08);
            border-color: #25d366;
            color: #fff;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.05);
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.04);
            border-color: #25d36666;
        }

        /* === PANELS === */
        .panel {
            display: none;
            animation: fadeSlide 0.4s ease;
        }
        .panel.active { display: block; }

        /* === ZONE DE SAISIE === */
        .input-area {
            background: rgba(11, 20, 26, 0.7);
            border-radius: 24px;
            padding: 20px 22px 24px;
            border: 1px solid #2a3b44;
            margin-bottom: 16px;
        }
        .input-area label {
            color: #d1d9df;
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
            margin-bottom: 8px;
        }
        .input-area label i { color: #25d366; margin-right: 8px; }
        .input-area textarea {
            width: 100%;
            background: #0b141a;
            border: 1.5px solid #2a3b44;
            border-radius: 16px;
            padding: 14px 18px;
            color: #e9edef;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: 0.3s;
            line-height: 1.6;
        }
        .input-area textarea:focus {
            border-color: #25d366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.05);
        }
        .input-area textarea::placeholder {
            color: #4a5b65;
        }

        /* === CODE (fils de JOY) === */
        .code-box {
            background: rgba(15, 26, 34, 0.8);
            border-radius: 20px;
            padding: 14px 20px;
            border-left: 4px solid #f5c542;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .code-box label {
            color: #f5c542;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .code-box input {
            flex: 1;
            min-width: 120px;
            background: #0b141a;
            border: 1.5px solid #2a3b44;
            border-radius: 30px;
            padding: 10px 18px;
            color: #e9edef;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }
        .code-box input:focus {
            border-color: #f5c542;
            box-shadow: 0 0 20px rgba(245, 197, 66, 0.05);
        }
        .code-status {
            color: #8696a0;
            font-size: 0.8rem;
            background: #0b141a;
            padding: 5px 16px;
            border-radius: 30px;
            border: 1px solid #2a3b44;
            font-weight: 500;
        }
        .code-status.valid {
            border-color: #25d366;
            color: #25d366;
        }
        .code-status.invalid {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* === BOUTONS === */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-gen {
            flex: 1;
            min-width: 160px;
            background: #25d366;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: #0b141a;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.15);
        }
        .btn-gen:hover {
            transform: scale(1.03);
            background: #2fd873;
            box-shadow: 0 0 50px rgba(37, 211, 102, 0.25);
        }
        .btn-copy {
            background: rgba(26, 42, 50, 0.6);
            border: 1.5px solid rgba(37, 211, 102, 0.3);
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            color: #d1d9df;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-copy:hover {
            background: rgba(26, 42, 50, 0.9);
            border-color: #25d366;
            color: #fff;
        }

        /* === MESSAGE GÉNÉRÉ === */
        .output {
            background: rgba(11, 20, 26, 0.7);
            border-radius: 20px;
            padding: 20px 24px;
            border: 1px solid #2a3b44;
            min-height: 90px;
            color: #e9edef;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-top: 14px;
            white-space: pre-wrap;
            word-break: break-word;
            transition: 0.3s;
        }
        .output:empty::before {
            content: '📨 Générez un message de signalement...';
            color: #4a5b65;
        }

        /* === FOOTER === */
        .footer {
            margin-top: 24px;
            text-align: center;
            color: #4a5b65;
            font-size: 0.7rem;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 16px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .footer span i { margin: 0 4px; }
        .footer .joyboy { color: #25d36688; font-weight: 600; }

        /* === RESPONSIVE === */
        @media (max-width: 700px) {
            .whatsapp-card { padding: 18px; }
            .title { font-size: 1.2rem; }
            .logo-wa { font-size: 2rem; }
            .logo-wa i { font-size: 1.6rem; padding: 8px; }
            .tab-btn { font-size: 0.85rem; min-width: 100px; padding: 10px 12px; }
            .header-right { font-size: 0.7rem; padding: 6px 12px; }
        }
        @media (max-width: 480px) {
            .whatsapp-card { border-radius: 28px; padding: 14px; }
            .title { font-size: 1rem; }
            .tab-btn { font-size: 0.75rem; min-width: 70px; padding: 8px 8px; gap: 4px; }
            .tab-btn i { font-size: 0.9rem; }
            .btn-gen { font-size: 0.9rem; padding: 12px 18px; min-width: 120px; }
        }
    </style>
</head>
<body>

    <!-- === VIDÉO JOYBOY (Luffy Gear 5) === -->
    <div class="video-bg">
        <iframe src="https://www.youtube.com/embed/TxjVbR4iF54?autoplay=1&mute=1&loop=1&playlist=TxjVbR4iF54&controls=0&showinfo=0&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="video-overlay"></div>

    <!-- === CARTE === -->
    <div class="whatsapp-card">

        <!-- HEADER -->
        <div class="whatsapp-header">
            <div class="header-left">
                <div class="logo-wa">
                    <i class="fab fa-whatsapp"></i>
                    <span class="badge">JOY</span>
                </div>
                <div class="title">
                    WhatsApp <span>Signalement</span>
                    <span class="sub"><i class="fas fa-shield-alt" style="color:#25d366;"></i> Générateur de messages officiels</span>
                </div>
            </div>
            <div class="header-right">
                <span class="dot"></span>
                <span>Sécurisé</span>
                <span style="border-left:1px solid #2a3b44;padding-left:10px;"><i class="fas fa-flag"></i> Urgent</span>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="panel-fans">
                <i class="fas fa-users"></i> Fans de JOY
            </button>
            <button class="tab-btn" data-tab="panel-fils">
                <i class="fas fa-crown"></i> Fils de JOY
            </button>
        </div>

        <!-- PANEL FANS -->
        <div id="panel-fans" class="panel active">
            <div class="input-area">
                <label><i class="fas fa-pen"></i> Détails du compte (optionnel)</label>
                <textarea id="input-fans" placeholder="Numéro, comportement suspect, preuves..."></textarea>
            </div>
            <div class="actions">
                <button class="btn-gen" id="gen-fans"><i class="fas fa-shield-alt"></i> Générer</button>
                <button class="btn-copy" id="copy-fans"><i class="fas fa-copy"></i> Copier</button>
            </div>
            <div class="output" id="output-fans"></div>
        </div>

        <!-- PANEL FILS DE JOY -->
        <div id="panel-fils" class="panel">
            <div class="code-box">
                <label><i class="fas fa-key"></i> Code d'accès</label>
                <input type="text" id="access-code" placeholder="Code secret..." />
                <span class="code-status" id="code-status"><i class="fas fa-circle"></i> En attente</span>
            </div>
            <div class="input-area">
                <label><i class="fas fa-pen" style="color:#f5c542;"></i> Détails du signalement</label>
                <textarea id="input-fils" placeholder="Infos supplémentaires sur le compte dangereux..."></textarea>
            </div>
            <div class="actions">
                <button class="btn-gen" id="gen-fils"><i class="fas fa-shield-alt"></i> Générer</button>
                <button class="btn-copy" id="copy-fils"><i class="fas fa-copy"></i> Copier</button>
            </div>
            <div class="output" id="output-fils"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span><i class="fas fa-lock" style="color:#25d366;"></i> Chiffré</span>
            <span class="joyboy"><i class="fas fa-skull"></i> JOYBOY Gear 5 <i class="fas fa-skull"></i></span>
            <span><i class="fab fa-whatsapp" style="color:#25d366;"></i> WhatsApp Inc.</span>
        </div>

    </div>

    <script>
        // === TABS ===
        const tabs = document.querySelectorAll('.tab-btn');
        const panels = {
            fans: document.getElementById('panel-fans'),
            fils: document.getElementById('panel-fils')
        };

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', `panel-${key}` === target);
                });
            });
        });

        // === CODE ===
        const codeInput = document.getElementById('access-code');
        const codeStatus = document.getElementById('code-status');
        const SECRET = 'JOY2026';

        function checkCode() {
            const val = codeInput.value.trim();
            if (val === SECRET) {
                codeStatus.className = 'code-status valid';
                codeStatus.innerHTML = '<i class="fas fa-check-circle"></i> Valide';
                return true;
            } else if (val === '') {
                codeStatus.className = 'code-status';
                codeStatus.innerHTML = '<i class="fas fa-circle"></i> En attente';
                return false;
            } else {
                codeStatus.className = 'code-status invalid';
                codeStatus.innerHTML = '<i class="fas fa-times-circle"></i> Incorrect';
                return false;
            }
        }
        codeInput.addEventListener('input', checkCode);

        // === GÉNÉRATION DE MESSAGES (naturels, sans décorations) ===
        function generateMessage(type, details) {
            const now = new Date();
            const date = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            const time = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

            const userDetails = details && details.trim().length > 3
                ? details.trim()
                : 'Compte suspect avec un comportement inapproprié et des violations répétées des conditions d\'utilisation de WhatsApp.';

            if (type === 'fans') {
                return `Bonjour,

Je vous contacte pour signaler un compte WhatsApp qui ne respecte pas les règles de la plateforme.

Compte concerné : ${userDetails}

Ce compte a un comportement dangereux et abuse des autres utilisateurs. J'ai constaté plusieurs violations :
- Non-respect des conditions d'utilisation
- Comportement abusif et intimidant
- Tentatives de harcèlement
- Diffusion de contenus inappropriés

Je dispose de preuves (captures d'écran) que je peux fournir si nécessaire.

Je vous demande de bloquer définitivement ce compte pour protéger la communauté WhatsApp.

Merci de prendre ma demande en considération.

Cordialement,
Un utilisateur engagé pour la sécurité de WhatsApp`;
            }

            if (type === 'fils') {
                return `Bonjour,

Je vous écris pour signaler un compte très dangereux sur WhatsApp qui représente une menace sérieuse pour la sécurité des utilisateurs.

Compte à signaler : ${userDetails}

Ce compte a un comportement extrêmement problématique :
- Menaces et intimidations
- Usurpation d'identité
- Tentatives d'escroquerie
- Harcèlement systématique
- Multiples signalements ignorés

J'ai rassemblé des preuves solides : captures d'écran authentifiées, historique des conversations et témoignages de victimes.

Je vous demande un blocage immédiat de ce compte ainsi qu'une interdiction de création de nouveau compte. Une analyse approfondie devrait être effectuée.

Cette demande est urgente pour protéger les utilisateurs de WhatsApp.

Dans l'attente de votre action,

Cordialement,
Un membre engagé de la communauté`;
            }

            return 'Message généré.';
        }

        // === AFFICHAGE ===
        const outputFans = document.getElementById('output-fans');
        const outputFils = document.getElementById('output-fils');
        const inputFans = document.getElementById('input-fans');
        const inputFils = document.getElementById('input-fils');

        function displayMessage(type) {
            const input = type === 'fans' ? inputFans : inputFils;
            const output = type === 'fans' ? outputFans : outputFils;

            if (type === 'fils' && !checkCode()) {
                output.textContent = 'Accès refusé. Veuillez entrer le code correct.';
                output.style.borderColor = '#ff6b6b';
                return;
            }
            output.style.borderColor = '#2a3b44';

            const msg = generateMessage(type, input.value);
            output.textContent = msg;
        }

        // === BOUTONS ===
        document.getElementById('gen-fans').addEventListener('click', () => displayMessage('fans'));
        document.getElementById('gen-fils').addEventListener('click', () => displayMessage('fils'));

        function copyMessage(type) {
            const output = type === 'fans' ? outputFans : outputFils;
            const text = output.textContent;
            if (!text || text.includes('Accès refusé') || text.includes('📨 Générez')) {
                alert('Veuillez générer un message d\'abord.');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = type === 'fans' ? document.getElementById('copy-fans') : document.getElementById('copy-fils');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copié';
                setTimeout(() => btn.innerHTML = orig, 2000);
            }).catch(() => alert('Copie manuelle : sélectionnez et copiez.'));
        }

        document.getElementById('copy-fans').addEventListener('click', () => copyMessage('fans'));
        document.getElementById('copy-fils').addEventListener('click', () => copyMessage('fils'));

        // === ENTER POUR GÉNÉRER ===
        inputFans.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                displayMessage('fans');
            }
        });
        inputFils.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                displayMessage('fils');
            }
        });

        // === AUTO GÉNÉRATION ===
        window.addEventListener('load', () => displayMessage('fans'));

        console.log('🛡️ JOYBOY WhatsApp Security Generator');
        console.log('🔐 Code Fils de JOY : JOY2026');
        console.log('🏴‍☠️ Joyboy Gear 5 activated');
    </script>

</body>
</html>
